<script>
const buttonPairs = [
    { text: 'improbabilB', img: 'Improbabil', color: '#F2DC1B' },
    { text: 'uranusB', img: 'Uranus', color: '#F26018' },         
    { text: 'bridgesB', img: 'Poduri', color: '#4EB2CC' },        
    { text: 'laughingB', img: 'Laughing', color: '#DCED2B' },    
    { text: 'vacuiB', img: 'Horror-Vacui', color: '#9E1010' },    
    { text: 'rauriB', img: 'Rauri', color: '#1411B8' },          
    { text: 'clovniB', img: 'Clovni', color: '#F21111' },         
    { text: 'otherB', img: 'Other-projects', color: '#F5D000' }   
];

buttonPairs.forEach(pair => {
    const textBtn = document.getElementById(pair.text);
    const imgBtn = document.getElementById(pair.img).querySelector('img');

    if (!textBtn || !imgBtn) return;

    function addHover() {
        textBtn.style.transform = "scale(1.1)";
        textBtn.style.color = pair.color;   
        imgBtn.style.transform = "scale(1.3)";
    }

    function removeHover() {
        textBtn.style.transform = "";
        textBtn.style.color = "";  
        imgBtn.style.transform = "";
    }

    textBtn.addEventListener('mouseenter', addHover);
    textBtn.addEventListener('mouseleave', removeHover);

    imgBtn.addEventListener('mouseenter', addHover);
    imgBtn.addEventListener('mouseleave', removeHover);
});

</script>
